<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* HERO */
  .hero { background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 50%,#0F172A 100%); padding:40px 24px 48px; text-align:center; position:relative; overflow:hidden; }

  .hero-icons { display:flex; justify-content:center; gap:32px; margin-bottom:20px; position:relative; }
  .hero-subtitle { color:#94A3B8; font-size:12px; letter-spacing:.15em; text-transform:uppercase; margin-bottom:10px; position:relative; }
  .hero h1 { color:#FFF; font-size:clamp(22px,6vw,38px); font-weight:900; line-height:1.2; position:relative; margin-bottom:10px; }
  .hero h1 span.bike { color:var(--bike); } .hero h1 span.run { color:var(--run); }
  .hero-desc { color:#94A3B8; font-size:13px; position:relative; }

  .breadcrumb span { cursor:pointer; color:var(--bike); font-weight:700; }
  .breadcrumb span:hover { text-decoration:underline; }
  .breadcrumb .sep { color:#CBD5E1; }

  /* PAGES */
  .page { display:none; max-width:600px; margin:0 auto; padding:20px 16px 48px; }
  .page.active { display:block; }

  /* PAGE 1 - SPORT SELECT */
  .sport-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:8px; }
  .sport-card { background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); padding:32px 16px; text-align:center; cursor:pointer; transition:transform .2s, box-shadow .2s; border:2px solid transparent; }
  .sport-card:hover { transform:translateY(-3px); box-shadow:0 8px 32px rgba(0,0,0,0.12); }
  .sport-card.bike:hover { border-color:var(--bike); }
  .sport-card.run:hover  { border-color:var(--run); }
  .sport-card svg { margin-bottom:14px; }
  .sport-card .sport-name { font-size:18px; font-weight:900; margin-bottom:6px; }
  .sport-card.bike .sport-name { color:var(--bike-dark); }
  .sport-card.run  .sport-name { color:var(--run-dark); }
  .sport-card .sport-note { font-size:12px; color:var(--sub); }
  .page-title { font-size:17px; font-weight:900; margin-bottom:4px; }
  .page-subtitle { font-size:13px; color:var(--sub); margin-bottom:20px; }

  /* PAGE 2 - MENU SELECT */
  .menu-grid { display:flex; flex-direction:column; gap:14px; }
  .menu-card { background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); padding:20px 20px; cursor:pointer; transition:transform .2s; display:flex; align-items:center; gap:16px; border:2px solid transparent; }
  .menu-card:hover { transform:translateY(-2px); }
  .menu-card .menu-dot { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .menu-card .menu-info { flex:1; }
  .menu-card .menu-time { font-size:22px; font-weight:900; }
  .menu-card .menu-label { font-size:13px; color:var(--sub); margin-top:2px; }
  .menu-card .menu-arrow { font-size:18px; color:#CBD5E1; }
  .menu-card.easy  { } .menu-card.easy:hover  { border-color:var(--easy); }
  .menu-card.norm  { } .menu-card.norm:hover  { border-color:var(--normal); }
  .menu-card.hard  { } .menu-card.hard:hover  { border-color:var(--hard); }

  /* PAGE 3 - DETAIL */
  .detail-header { text-align:center; margin-bottom:20px; }
  .detail-header h2 { font-size:20px; font-weight:900; margin-bottom:4px; }
  .detail-header p { font-size:13px; color:var(--sub); }
  .program-card { background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden; }
  .card-header { padding:18px 20px 14px; display:flex; align-items:center; gap:14px; }
  .card-icon { width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .card-title-group { flex:1; }
  .difficulty-badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:4px; }
  .badge-easy   { background:#DCFCE7; color:#15803D; }
  .badge-normal { background:#DBEAFE; color:#1D4ED8; }
  .badge-hard   { background:#FEE2E2; color:#DC2626; }
  .card-title { font-size:17px; font-weight:900; line-height:1.2; margin-bottom:4px; }
  .card-meta { font-size:12px; color:var(--sub); display:flex; gap:12px; }
  .card-purpose { padding:0 20px 16px; font-size:13px; color:var(--sub); line-height:1.6; border-bottom:1px solid #F1F5F9; }
  .workout-list { padding:12px 20px 16px; }
  .workout-item { display:flex; align-items:flex-start; gap:14px; padding:12px 0; border-bottom:1px dashed #E2E8F0; }
  .workout-item:last-child { border-bottom:none; }
  .workout-step { width:28px; height:28px; border-radius:8px; flex-shrink:0; }
  .workout-info { flex:1; }
  .workout-name { font-size:14px; font-weight:700; margin-bottom:2px; }
  .workout-desc { font-size:12px; color:var(--sub); line-height:1.6; }
  .workout-time { font-size:13px; font-weight:700; flex-shrink:0; text-align:right; white-space:nowrap; }

  /* BACK BTN */
  .back-btn { display:inline-flex; align-items:center; gap:6px; background:white; border:none; border-radius:10px; padding:10px 16px; font-family:inherit; font-size:14px; font-weight:700; color:var(--sub); cursor:pointer; box-shadow:var(--shadow); margin-bottom:16px; transition:background .2s; }
  .back-btn:hover { background:#F1F5F9; }

  footer { text-align:center; padding:20px; font-size:12px; color:#94A3B8; }
</style>
</head>

          { color:'#FF6B35', name:'メインメニュー２', desc:'スピード変化走を行います。以下を3セット行いましょう。<br><br>2分（RPE 6-7）→ 1分イージー × 3セット', time:'9分' },
          { color:'#94A3B8', name:'クールダウン', desc:'心拍数を落として気持ちよく回す', time:'11分' },
        ]
      },
      '60': {
        badge: '🔴 60分メニュー',
        badgeClass: 'badge-hard',
        iconBg: '#FEE2E2',
        accentColor: '#EF4444',
        meta: ['⏱ 約60分', '💓 エアロビックラン'],
        purpose: 'お時間が取れてゆっくりエアロビックランが出来る時に行いましょう。',
        label: 'しっかり走りたい時',
        steps: [
          { color:'#94A3B8', name:'ウォームアップ', desc:'ゆっくり歩きながら体調、足の状態を確かめましょう。少し足の体操やストレッチも入れながら行うと良いです。', time:'10分' },
          { color:'#EF4444', name:'メインメニュー', desc:'RPE 4-5で気持ちよく走りましょう。', time:'50分' },
        ]
      }

  }
};

// ===== 状態 =====
let currentSport = null;
let currentMenu = null;

// ===== ナビゲーション =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const bcSep1 = document.getElementById('bc-sep1');
  const bcSport = document.getElementById('bc-sport');
  const bcSep2 = document.getElementById('bc-sep2');
  const bcMenu = document.getElementById('bc-menu');

  if (!currentSport) { bc.style.display = 'none'; return; }
  bc.style.display = 'flex';
  bcSep1.style.display = 'inline';
  bcSport.style.display = 'inline';
  bcSport.textContent = data[currentSport].name;
  bcSport.onclick = goMenu;

  if (currentMenu) {
    bcSep2.style.display = 'inline';
    bcMenu.style.display = 'inline';
    bcMenu.textContent = currentMenu + '分メニュー';
  } else {
    bcSep2.style.display = 'none';
    bcMenu.style.display = 'none';
  }
}

function goHome() {
  currentSport = null; currentMenu = null;
  updateBreadcrumb();
  showPage('sport');
}

function goMenu() {
  currentMenu = null;
  updateBreadcrumb();
  showPage('menu');
}

function selectSport(sport) {
  currentSport = sport;
  const d = data[sport];
  document.getElementById('menu-title').textContent = d.name + 'のメニューを選んでください';
  const labels = { '20': d.menus['20'].label, '40': d.menus['40'].label, '60': d.menus['60'].label };
  document.getElementById('label-20').textContent = labels['20'];
  document.getElementById('label-40').textContent = labels['40'];
  document.getElementById('label-60').textContent = labels['60'];
  updateBreadcrumb();
  showPage('menu');
}

function selectMenu(min) {
  currentMenu = min;
  const d = data[currentSport].menus[min];
  const sport = currentSport;

  // SVGアイコン
  const svgBike = `<svg width="32" height="32" viewBox="0 0 64 64" fill="none">
    <circle cx="16" cy="44" r="12" stroke="${d.accentColor}" stroke-width="4" fill="none"/>
    <circle cx="48" cy="44" r="12" stroke="${d.accentColor}" stroke-width="4" fill="none"/>
    <circle cx="16" cy="44" r="3" fill="${d.accentColor}"/>
    <circle cx="48" cy="44" r="3" fill="${d.accentColor}"/>
    <polyline points="16,44 28,20 40,20" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="40,20 48,44" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="28,20 32,32 48,44" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>`;
  const svgRun = `<svg width="32" height="32" viewBox="0 0 64 64" fill="none">
    <circle cx="36" cy="10" r="6" fill="${d.accentColor}"/>
    <line x1="36" y1="16" x2="30" y2="34" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="22" x2="18" y2="28" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="22" x2="44" y2="18" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="34" x2="22" y2="48" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="34" x2="40" y2="46" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="48" x2="14" y2="52" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round"/>
    <line x1="40" y1="46" x2="48" y2="50" stroke="${d.accentColor}" stroke-width="4" stroke-linecap="round"/>
  </svg>`;

  const stepsHTML = d.steps.map(s => `
    <div class="workout-item">
      <div class="workout-step" style="background:${s.color};"></div>
      <div class="workout-info">
        <div class="workout-name">${s.name}</div>
        <div class="workout-desc">${s.desc}</div>
      </div>
      <div class="workout-time" style="color:${s.color};">${s.time}</div>
    </div>`).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="program-card">
      <div class="card-header">
        <div class="card-icon" style="background:${d.iconBg};">${sport === 'bike' ? svgBike : svgRun}</div>
        <div class="card-title-group">
          <span class="difficulty-badge ${d.badgeClass}">${d.badge}</span>
          <div class="card-title">${min}分メニュー</div>
          <div class="card-meta">${d.meta.map(m => `<span>${m}</span>`).join('')}</div>
        </div>
      </div>
      <p class="card-purpose">${d.purpose}</p>
      <div class="workout-list">${stepsHTML}</div>
    </div>`;

  updateBreadcrumb();
  showPage('detail');
}
</script>
